<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>myremomo</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">
                <div class="logo-icon"></div>
                <h2>myremomo</h2>
            </div>
            
            <div class="model-selection">
                <div id="model-list" class="model-list">
                    <div class="loading-text">Loading models...</div>
                </div>
            </div>

            <div class="sidebar-footer">
                <button id="new-chat-btn" class="btn primary-btn">
                    <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                    New Chat
                </button>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="chat-container">
            <!-- Mobile Header (Visible only on small screens) -->
            <header class="mobile-header">
                <button id="menu-btn" class="icon-btn">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="3" y1="12" x2="21" y2="12"></line>
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <line x1="3" y1="18" x2="21" y2="18"></line>
                    </svg>
                </button>
                <h3 id="mobile-model-name">myremomo</h3>
                <div style="width: 24px;"></div> <!-- spacer -->
            </header>

            <div id="chat-messages" class="chat-messages">
                <div class="welcome-message">
                    <div class="welcome-icon"></div>
                    <h1>How can I help you today?</h1>
                    <p>Select a model from the sidebar to begin.</p>
                </div>
            </div>
            
            <div class="chat-input-wrapper">
                <form id="chat-form">
                    <div class="input-container">
                        <textarea id="message-input" placeholder="Message Ollama..." rows="1" disabled></textarea>
                        <button type="submit" id="send-btn" class="icon-btn send-btn" disabled>
                            <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="22" y1="2" x2="11" y2="13"></line>
                                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                            </svg>
                        </button>
                    </div>
                </form>
                <div class="footer-text">myremomo runs entirely locally.</div>
            </div>
        </main>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
